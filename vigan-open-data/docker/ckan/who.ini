[general]
request_type = GET,POST

[logging]
logger = paste
level = warning

[filter:proxy_prefix]
use = egg:PasteDeploy#prefix

[filter:paste_prefix]
use = egg:Paste#prefix

[plugin:sql_db]
use = repoze.who.plugins.sql:make_who_with_config

[identifiers]
plugins = auth_tkt

[authenticators]
plugins = htpasswd;auth_tkt

[challengers]
plugins = friendlyform;basicauth

[mdproviders]
plugins =

[plugin:basicauth]
use = repoze.who.plugins.basicauth:make_plugin
realm = CKAN

[plugin:auth_tkt]
use = repoze.who.plugins.auth_tkt:make_plugin
secret = %(CKAN_BEAKER_SESSION_SECRET)s
cookie_name = auth_tkt
secure = false
include_ip = false
timeout = 86400
reissue_time = 9000

[plugin:friendlyform]
use = repoze.who.plugins.friendlyform:make_plugin
login_form_url = /user/login
login_handler_path = /login_generic
logout_handler_path = /user/_logout
rememberer_name = auth_tkt
post_login_url = /dashboard
post_logout_url = /user/logged_out_redirect

[plugin:htpasswd]
use = repoze.who.plugins.htpasswd:make_plugin
filename = %(here)s/passwd
check_fn = repoze.who.plugins.htpasswd:crypt_check
