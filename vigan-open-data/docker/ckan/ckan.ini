[DEFAULT]

# =============================================================================
# CKAN Configuration — Vigan City Open Data Portal
# All secret values should be overridden via environment variables in production
# =============================================================================

[app:main]
use = egg:ckan

# ── Core ──────────────────────────────────────────────────────────────────────
ckan.site_url = %(CKAN_SITE_URL)s
ckan.site_title = Vigan City Open Data Portal
ckan.site_description = Official open data portal of the City Government of Vigan, Ilocos Sur, Philippines
ckan.site_intro_text = Discover, explore, and download open data from Vigan City government departments.
ckan.favicon = /images/vigan-favicon.ico
ckan.gravatar_default = identicon
ckan.preview.direct = png jpg gif
ckan.preview.loadable = html htm rdf+xml owl+xml xml n3 n-triples turtle plain atom csv tsv rss txt json
SECRET_KEY = %(CKAN_SECRET_KEY)s
beaker.session.secret = %(CKAN_BEAKER_SESSION_SECRET)s
beaker.session.validate_key = %(CKAN_BEAKER_SESSION_VALIDATE_KEY)s
ckan.csrf_protection.ignore_extensions = false

# ── Locale ────────────────────────────────────────────────────────────────────
ckan.locale_default = en
ckan.locale_order = en
ckan.locales_offered =
ckan.locales_filtered_out = en_GB

# ── Database ──────────────────────────────────────────────────────────────────
sqlalchemy.url = %(CKAN_SQLALCHEMY_URL)s

# ── Authorization ─────────────────────────────────────────────────────────────
ckan.auth.anon_create_dataset = false
ckan.auth.create_unowned_dataset = false
ckan.auth.create_dataset_if_not_in_organization = false
ckan.auth.user_create_groups = false
ckan.auth.user_create_organizations = false
ckan.auth.user_delete_groups = true
ckan.auth.user_delete_organizations = true
ckan.auth.create_user_via_api = false
ckan.auth.create_user_via_web = false
ckan.auth.roles_that_cascade_to_sub_groups = admin
ckan.auth.public_user_details = true
ckan.auth.public_activity_stream_detail = true
ckan.auth.allow_dataset_collaborators = false

# ── Search ────────────────────────────────────────────────────────────────────
solr_url = %(CKAN_SOLR_URL)s
ckan.search.solr_allowed_query_parsers = frange

# ── Redis ─────────────────────────────────────────────────────────────────────
ckan.redis.url = %(CKAN_REDIS_URL)s

# ── Plugins ───────────────────────────────────────────────────────────────────
ckan.plugins = %(CKAN__PLUGINS)s

# ── Views ─────────────────────────────────────────────────────────────────────
ckan.views.default_views = image_view text_view recline_view

# ── DataStore ─────────────────────────────────────────────────────────────────
ckan.datastore.write_url = %(CKAN_DATASTORE_WRITE_URL)s
ckan.datastore.read_url = %(CKAN_DATASTORE_READ_URL)s
ckan.datastore.sqlsearch.enabled = true

# ── DataPusher ────────────────────────────────────────────────────────────────
ckan.datapusher.url = %(CKAN__DATAPUSHER__URL)s
ckan.datapusher.callback_url_base = %(CKAN__DATAPUSHER__CALLBACK_URL_BASE)s
ckan.datapusher.formats = csv xls xlsx tsv application/csv application/vnd.ms-excel
ckan.datapusher.assume_task_stale_after = 3600

# ── Storage ───────────────────────────────────────────────────────────────────
ckan.storage_path = /var/lib/ckan

# ── Activity Streams ──────────────────────────────────────────────────────────
ckan.activity_streams_enabled = true
ckan.activity_streams_email_notifications = false

# ── Harvesting ────────────────────────────────────────────────────────────────
# (enable ckanext-harvest if needed)
# ckan.harvest.mq.type = redis

# ── API ───────────────────────────────────────────────────────────────────────
ckan.cors.origin_allow_all = true

# ── Theming ───────────────────────────────────────────────────────────────────
ckan.template_head_end = <link rel="preconnect" href="https://fonts.googleapis.com">

# ── Email (configure for production) ─────────────────────────────────────────
email_to = admin@vigan.gov.ph
error_email_from = portal@vigan.gov.ph
smtp.server = localhost
smtp.starttls = false
smtp.user =
smtp.password =
smtp.mail_from = portal@vigan.gov.ph

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root, ckan, ckanext

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_ckan]
level = INFO
handlers = console
qualname = ckan
propagate = 0

[logger_ckanext]
level = DEBUG
handlers = console
qualname = ckanext
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
