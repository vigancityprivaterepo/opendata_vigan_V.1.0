# =============================================================================
# nginx.conf — Vigan City Open Data Portal Reverse Proxy
# Routes:
#   /api/*            → CKAN backend  (port 5000)
#   /dataset/*        → CKAN backend
#   /organization/*   → CKAN backend
#   /group/*          → CKAN backend
#   /user/*           → CKAN backend
#   /dashboard/*      → CKAN backend
#   /login_generic    → CKAN backend
#   /uploads/*        → CKAN backend (file storage)
#   everything else   → Next.js frontend (port 3000)
# =============================================================================

user nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100M;   # Allow large file uploads

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream ckan_backend {
        server ckan:5000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── Proxy headers shared across locations ─────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    proxy_read_timeout      300s;
    proxy_connect_timeout   75s;
    proxy_send_timeout      300s;
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;

    # ── Main HTTP server ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── CKAN API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://ckan_backend;

            # Allow large API POST bodies (bulk resource upload)
            client_max_body_size 100M;

            # CORS for developer access
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ── CKAN dataset, organization, group, user routes ────────────────────
        location ~ ^/(dataset(?:/|$)|organization(?:/|$)|group(?:/|$)|user(?:/|$)|dashboard(?:/|$)|login_generic(?:/|$)|revision(?:/|$)|tag(?:/|$)|related(?:/|$)|api(?:/|$)|feeds(?:/|$)|util(?:/|$)|fanstatic(?:/|$)|ckan-admin(?:/|$)|webassets(?:/|$)|error(?:/|$)|uploads(?:/|$)) {
            proxy_pass http://ckan_backend;
            client_max_body_size 100M;
        }

        # ── CKAN uploaded files (file storage) ────────────────────────────────
        location /uploads/ {
            proxy_pass http://ckan_backend/uploads/;
        }

        # ── Next.js — static assets (aggressive caching) ─────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs_frontend;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js — everything else (public portal) ─────────────────────────
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Health check endpoint ─────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS stub (enable once you have certs) ────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name data.vigan.gov.ph;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above ...
    # }
}
